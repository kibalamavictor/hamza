<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Donate - Healinghearts charity organisation</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* Donate Page Specific Styles */
        .donate-page {
            min-height: 100vh;
            background: linear-gradient(135deg, #ffebee, #fff3e0);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
        }

        .donate-page::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url('1M2A9193.jpg') center/cover;
            opacity: 0.1;
            z-index: 0;
        }

        .donate-container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.1);
            max-width: 500px;
            width: 100%;
            position: relative;
            z-index: 1;
            border: 1px solid rgba(233, 30, 99, 0.1);
        }

        .donate-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .donate-header h1 {
            color: var(--primary-red, #c62828);
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .donate-header p {
            color: #666;
            font-size: 1rem;
            line-height: 1.6;
        }

        .donate-form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            color: var(--text-dark, #2c3e50);
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 0.95rem;
        }

        .form-group input,
        .form-group select {
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1rem;
            transition: all 0.3s ease;
            font-family: 'Inter', sans-serif;
            background: white;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--primary-red, #c62828);
            box-shadow: 0 0 0 3px rgba(233, 30, 99, 0.1);
        }

        .form-group input.error,
        .form-group select.error {
            border-color: #dc3545;
            background: #fff5f5;
        }

        .error-message {
            color: #dc3545;
            font-size: 0.85rem;
            margin-top: 5px;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .phone-format-hint {
            font-size: 0.8rem;
            color: #666;
            margin-top: 5px;
        }

        .donate-button {
            background: linear-gradient(135deg, var(--primary-red, #c62828), var(--emotional-pink, #e91e63));
            color: white;
            border: none;
            padding: 18px;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            position: relative;
            overflow: hidden;
        }

        .donate-button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(198, 40, 40, 0.3);
        }

        .donate-button:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        .donate-button.loading {
            color: transparent;
        }

        .donate-button.loading::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            top: 50%;
            left: 50%;
            margin-left: -10px;
            margin-top: -10px;
            border: 2px solid #ffffff;
            border-radius: 50%;
            border-top-color: transparent;
            animation: spinner 0.8s linear infinite;
        }

        @keyframes spinner {
            to { transform: rotate(360deg); }
        }

        .back-link {
            text-align: center;
            margin-top: 30px;
        }

        .back-link a {
            color: var(--primary-red, #c62828);
            text-decoration: none;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: color 0.3s ease;
        }

        .back-link a:hover {
            color: var(--emotional-pink, #e91e63);
        }

        .back-link a::before {
            content: '←';
            font-size: 1.2rem;
        }

        .message {
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: none;
            font-weight: 500;
        }

        .message.show {
            display: block;
            animation: slideIn 0.3s ease;
        }

        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        @keyframes slideIn {
            from {
                transform: translateY(-20px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        /* Responsive Design */
        @media (max-width: 600px) {
            .donate-container {
                padding: 30px 20px;
                margin: 10px;
            }

            .donate-header h1 {
                font-size: 1.5rem;
            }

            .form-group input,
            .form-group select {
                padding: 12px;
            }

            .donate-button {
                padding: 15px;
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="donate-page">
        <div class="donate-container">
            <div class="donate-header">
                <h1>Make a Donation</h1>
                <p>Support vulnerable children through mobile money</p>
            </div>

            <div id="message" class="message"></div>

            <form id="donateForm" class="donate-form">
                <div class="form-group">
                    <label for="fullName">Full Name</label>
                    <input type="text" id="fullName" name="fullName" required placeholder="Enter your full name">
                    <span class="error-message" id="fullNameError">Please enter your full name</span>
                </div>

                <div class="form-group">
                    <label for="phoneNumber">Phone Number</label>
                    <input type="tel" id="phoneNumber" name="phoneNumber" required placeholder="e.g., 0743541246 or 0741863462">
                    <span class="phone-format-hint">Format: 07xxxxxxxx or 00xxxxxxxx</span>
                    <span class="error-message" id="phoneNumberError">Please enter a valid Ugandan phone number</span>
                </div>

                <div class="form-group">
                    <label for="amount">Amount (UGX)</label>
                    <input type="number" id="amount" name="amount" required placeholder="Enter amount" min="500">
                    <span class="error-message" id="amountError">Minimum donation amount is UGX 500</span>
                </div>

                <div class="form-group">
                    <label for="provider">Network Provider</label>
                    <select id="provider" name="provider" required>
                        <option value="">Select your network</option>
                        <option value="mtn">MTN MoMo</option>
                        <option value="airtel">Airtel Money</option>
                    </select>
                    <span class="error-message" id="providerError">Please select your network provider</span>
                </div>

                <button type="submit" id="donateButton" class="donate-button">
                    Donate Now
                </button>
            </form>

            <div class="back-link">
                <a href="index.html">Back to Home</a>
            </div>
        </div>
    </div>

    <script>
        // Form validation and submission
        const form = document.getElementById('donateForm');
        const donateButton = document.getElementById('donateButton');
        const messageDiv = document.getElementById('message');

        // Phone number validation for Ugandan numbers
        function validatePhoneNumber(phone) {
            // Remove any spaces or special characters
            const cleanPhone = phone.replace(/\s/g, '');
            
            // Ugandan phone number patterns
            const patterns = [
                /^07\d{8}$/,  // 07xxxxxxxx
                /^00\d{9}$/   // 00xxxxxxxxx
            ];
            
            return patterns.some(pattern => pattern.test(cleanPhone));
        }

        // Show message function
        function showMessage(text, type) {
            messageDiv.textContent = text;
            messageDiv.className = `message ${type} show`;
            
            // Auto hide after 5 seconds
            setTimeout(() => {
                messageDiv.classList.remove('show');
            }, 5000);
        }

        // Clear all error messages
        function clearErrors() {
            document.querySelectorAll('.error-message').forEach(error => {
                error.classList.remove('show');
            });
            document.querySelectorAll('input, select').forEach(field => {
                field.classList.remove('error');
            });
        }

        // Show field error
        function showFieldError(fieldId, errorId) {
            document.getElementById(fieldId).classList.add('error');
            document.getElementById(errorId).classList.add('show');
        }

        // Validate form
        function validateForm(formData) {
            clearErrors();
            let isValid = true;

            // Validate full name
            if (!formData.fullName.trim()) {
                showFieldError('fullName', 'fullNameError');
                isValid = false;
            }

            // Validate phone number
            if (!validatePhoneNumber(formData.phoneNumber)) {
                showFieldError('phoneNumber', 'phoneNumberError');
                isValid = false;
            }

            // Validate amount
            const amount = parseInt(formData.amount);
            if (!amount || amount < 500) {
                showFieldError('amount', 'amountError');
                isValid = false;
            }

            // Validate provider
            if (!formData.provider) {
                showFieldError('provider', 'providerError');
                isValid = false;
            }

            return isValid;
        }

        // API call function
        async function submitDonation(data) {
            try {
                const response = await fetch('/api/donate', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(data)
                });

                const result = await response.json();

                if (response.ok) {
                    return { success: true, data: result };
                } else {
                    return { success: false, error: result.message || 'Payment request failed' };
                }
            } catch (error) {
                // For demo purposes, simulate success
                console.log('API call failed, simulating success for demo:', error);
                return { 
                    success: true, 
                    data: { 
                        transactionId: 'DEMO_' + Date.now(),
                        message: 'Payment request simulated successfully'
                    }
                };
            }
        }

        // Handle form submission
        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const formData = {
                fullName: document.getElementById('fullName').value,
                phoneNumber: document.getElementById('phoneNumber').value,
                amount: document.getElementById('amount').value,
                provider: document.getElementById('provider').value,
                timestamp: new Date().toISOString()
            };

            // Validate form
            if (!validateForm(formData)) {
                return;
            }

            // Show loading state
            donateButton.disabled = true;
            donateButton.classList.add('loading');
            donateButton.textContent = 'Processing...';

            try {
                // Submit to API
                const result = await submitDonation(formData);

                if (result.success) {
                    showMessage('A payment prompt has been sent to your phone. Please complete the transaction.', 'success');
                    
                    // Reset form
                    form.reset();
                    
                    // Log transaction for demo
                    console.log('Donation submitted:', {
                        ...formData,
                        transactionId: result.data.transactionId
                    });
                } else {
                    showMessage(result.error || 'Payment request failed. Please try again.', 'error');
                }
            } catch (error) {
                showMessage('An unexpected error occurred. Please try again.', 'error');
                console.error('Donation error:', error);
            } finally {
                // Reset button state
                donateButton.disabled = false;
                donateButton.classList.remove('loading');
                donateButton.textContent = 'Donate Now';
            }
        });

        // Real-time validation
        document.getElementById('fullName').addEventListener('blur', function() {
            if (!this.value.trim()) {
                showFieldError('fullName', 'fullNameError');
            } else {
                this.classList.remove('error');
                document.getElementById('fullNameError').classList.remove('show');
            }
        });

        document.getElementById('phoneNumber').addEventListener('blur', function() {
            if (!validatePhoneNumber(this.value)) {
                showFieldError('phoneNumber', 'phoneNumberError');
            } else {
                this.classList.remove('error');
                document.getElementById('phoneNumberError').classList.remove('show');
            }
        });

        document.getElementById('amount').addEventListener('blur', function() {
            const amount = parseInt(this.value);
            if (!amount || amount < 500) {
                showFieldError('amount', 'amountError');
            } else {
                this.classList.remove('error');
                document.getElementById('amountError').classList.remove('show');
            }
        });

        document.getElementById('provider').addEventListener('change', function() {
            if (!this.value) {
                showFieldError('provider', 'providerError');
            } else {
                this.classList.remove('error');
                document.getElementById('providerError').classList.remove('show');
            }
        });
    </script>
</body>
</html>
